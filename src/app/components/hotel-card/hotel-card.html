<div class="relative w-full aspect-[1/1.1] rounded-lg overflow-hidden group">
    <img [src]="imageUrl" class="absolute size-full object-cover transition ease-in-out duration-800 group-hover:scale-125" />
    <div class="absolute inset-0 bg-linear-to-t from-black/50 to-transparent pointer-events-none"></div>
    <div class="absolute flex gap-2 top-4 left-4">
        @for (tag of tags; track tag) {
        <span class="rounded-full px-2.5 py-1.5 text-xs font-semibold text-[#353B41] bg-white shadow-lg">{{ tag }}</span>
        }
    </div> 
    <div class="absolute w-full p-5 top-1/2 left-1/2 -translate-1/2 text-white drop-shadow-lg flex gap-7 flex-col text-center">
        <h2 class="text-4xl font-bold">{{name}}</h2>
        <p class="text-2xl">desde {{price | number:'1.0-0' }} ARS</p>
    </div>
</div>
